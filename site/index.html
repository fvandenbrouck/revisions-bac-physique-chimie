/* Correctif lisibilité cartes mentales Mermaid */
.mermaid-wrap {
  width: 100%;
  max-width: 100%;
  overflow-x: auto !important;
  overflow-y: visible !important;
  background: #ffffff !important;
  border: 1px solid var(--line);
  border-radius: 16px;
  padding: 20px;
  margin-top: 16px;
}

.mermaid-wrap .mermaid {
  min-width: 1100px;
  width: max-content;
  max-width: none !important;
}

.mermaid-wrap svg {
  min-width: 1100px !important;
  max-width: none !important;
  width: auto !important;
  height: auto !important;
}

.mermaid-wrap foreignObject,
.mermaid-wrap .nodeLabel {
  font-size: 15px !important;
  line-height: 1.25 !important;
}


/* Cartes mentales HTML lisibles */
.mindmap-html {
  display: grid;
  gap: 18px;
}

.mind-root {
  display: inline-block;
  justify-self: start;
  background: var(--accent);
  color: #fff;
  font-weight: 850;
  border-radius: 999px;
  padding: 10px 16px;
  box-shadow: 0 6px 20px rgba(37,99,235,.18);
}

.mind-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
  gap: 14px;
}

.mind-branch {
  background: #ffffff;
  border: 1px solid var(--line);
  border-radius: 16px;
  padding: 16px;
  box-shadow: 0 4px 18px rgba(15,23,42,.05);
}

.mind-branch h4 {
  margin: 0 0 10px;
  font-size: 17px;
  color: #0f172a;
}

.mind-branch ul {
  margin: 0;
  padding-left: 18px;
  color: #334155;
  line-height: 1.5;
}

.mind-branch li {
  margin: 6px 0;
}

.mind-branch li span {
  background: #f8fafc;
  border-radius: 8px;
  padding: 2px 5px;
}

function esc(s){return String(s??'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}
function fmt(s){
  s = String(s ?? '');

  // Protéger les formules avant de transformer les retours ligne en <br>.
  const math = [];
  function hold(m){
    const key = `@@MATH_${math.length}@@`;
    math.push(m);
    return key;
  }

  // Délimiteurs reconnus.
  s = s
    .replace(/\$\$[\s\S]*?\$\$/g, hold)
    .replace(/\$[^$\n]+?\$/g, hold)
    .replace(/\\\[[\s\S]*?\\\]/g, hold)
    .replace(/\\\([\s\S]*?\\\)/g, hold);

  // Échappement HTML hors formules.
  s = esc(s);

  // Markdown minimal hors formules.
  s = s.replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>');

  // Paragraphes hors formules.
  s = s
    .replace(/\n\n+/g,'</p><p>')
    .replace(/\n/g,'<br>');

  s = '<p>' + s + '</p>';

  // Réinjecter les formules sans échappement supplémentaire.
  math.forEach((m, i) => {
    s = s.replace(`@@MATH_${i}@@`, m);
  });

  return s;
}

          ],

function parseMermaidMindmap(src){
  src = String(src || '');
  const labels = {};
  const children = {};
  const parents = new Set();
  const childSet = new Set();

  function labelOf(token){
    const m = token.match(/^([A-Za-z0-9_]+)\[(.*)\]$/);
    if(!m) return {id: token.trim(), label: token.trim()};
    return {id: m[1], label: m[2]};
  }

  src.split(/\n+/).forEach(line => {
    line = line.trim();
    if(!line || line.startsWith('graph ')) return;
    const parts = line.split(/-->/);
    if(parts.length !== 2) return;

    const a = labelOf(parts[0].trim());
    const b = labelOf(parts[1].trim());

    labels[a.id] = a.label;
    labels[b.id] = b.label;

    if(!children[a.id]) children[a.id] = [];
    children[a.id].push(b.id);

    parents.add(a.id);
    childSet.add(b.id);
  });

  const roots = [...parents].filter(id => !childSet.has(id));
  const root = roots[0] || [...parents][0] || null;

  return {root, labels, children};
}

function renderMindmapHtml(course){

  const level1 = children[root] || [];

  function branchHtml(id){
    const kids = children[id] || [];
    return `<div class="mind-branch">

      ${kids.length ? `<ul>${kids.map(k => `<li><span>${esc(labels[k] || k)}</span>${(children[k]||[]).length ? `<ul>${children[k].map(x => `<li><span>${esc(labels[x] || x)}</span></li>`).join('')}</ul>` : ''}</li>`).join('')}</ul>` : ''}
    </div>`;
  }

  return `<div class="section-card">
    <h3>Synthèse structurée</h3>
    <div class="mindmap-html">
      <div class="mind-root">${esc(labels[root] || root)}</div>
      <div class="mind-grid">
        ${level1.map(branchHtml).join('')}
      </div>
    </div>
  </div>`;
}

function renderCourses(){const ids=theme==='all'?DATA.programme.thematiques.map(t=>t.id):[theme];$('#courseRoot').innerHTML=ids.map(id=>courseBlock(id)).join('');renderMath($('#courseRoot'));setTimeout(()=>{try{if(window.mermaid)mermaid.run({nodes:$('#courseRoot').querySelectorAll('.mermaid')});}catch(e){}},80);}
function courseBlock(id){
  const t = themeById(id), c = DATA.cours[id];
  if(!c) return `<div class="section-card"><h3>${t.icone} ${esc(t.titre)}</h3><p>Cours non disponible.</p></div>`;

  <div class="section-card"><h3>Définitions</h3><div class="def-grid">${(c.definitions||[]).map(d=>`<div class="mini-card"><strong>${esc(d.terme)}</strong>${esc(d.definition)}</div>`).join('')}</div></div>
  <div class="section-card"><h3>Formules clés</h3><div class="formula-grid">${(c.formules||[]).map(f=>`<div class="mini-card"><strong>${esc(f.nom)}</strong><div class="formula">$${esc(f.formule)}$</div><div class="source-note">${esc(f.variables||'')}</div><div class="source-note">${esc(f.conditions||'')}</div></div>`).join('')}</div></div>
  ${renderMindmapHtml(c)}
  <div class="section-card"><h3>Conseils bac</h3>${(c.conseils_bac||[]).map(a=>`<div class="advice">${esc(a)}</div>`).join('')}</div>`;

function renderMethodology(){
  const m = DATA.methodologie || DATA.methodology || {};
  const root = $('#methodologyRoot');

  if(!root){
    console.error('methodologyRoot introuvable');
    return;
  }

  if(!m || !Object.keys(m).length){
    root.innerHTML = '<div class="empty">Aucune méthodologie disponible.</div>';
    $('#countStatus').textContent = 'Méthode non disponible';
    return;
  }

  function list(items){
    items = Array.isArray(items) ? items : [];
    if(!items.length) return '';
    return `<ul class="method-list">${items.map(x => `<li>${esc(String(x))}</li>`).join('')}</ul>`;
  }

  let html = '';

  html += `<div class="section-card">
    <h3>Méthode bac</h3>
    <p>Cette page rassemble les gestes attendus au bac : lire l’énoncé, identifier le modèle, conduire le calcul, valider le résultat et rédiger clairement.</p>
    <div class="source-note">Source : ${esc(m.source || 'programme officiel et corpus de sujets')}</div>
  </div>`;

  if(Array.isArray(m.principes_generaux) && m.principes_generaux.length){
    html += `<div class="section-card"><h3>Principes généraux</h3><div class="method-grid">`;
    html += m.principes_generaux.map(p => `<div class="method-item">
      <h4>${esc(p.titre || 'Principe')}</h4>
      <p>${esc(p.conseil || p.texte || '')}</p>
      ${p.justification ? `<div class="source-note">${esc(p.justification)}</div>` : ''}
    </div>`).join('');
    html += `</div></div>`;
  }

  if(Array.isArray(m.demarche_resolution) && m.demarche_resolution.length){
    html += `<div class="section-card"><h3>Démarche de résolution</h3>`;
    html += m.demarche_resolution.map((e,i) => `<div class="method-step">
      <div class="step-num">${esc(e.etape || String(i+1))}</div>
      <div>
        <h4>${esc(e.titre || 'Étape')}</h4>
        ${list(e.actions)}
        ${Array.isArray(e.erreurs_a_eviter) && e.erreurs_a_eviter.length ? `<div class="method-kicker">Erreurs à éviter</div>${list(e.erreurs_a_eviter)}` : ''}
      </div>
    </div>`).join('');
    html += `</div>`;
  }

  const pc = m.par_competence || {};
  const labels = {
    s_approprier:"S’approprier",
    analyser_raisonner:"Analyser / raisonner",
    realiser:"Réaliser",
    valider:"Valider",
    communiquer:"Communiquer"
  };

  if(Object.keys(pc).length){
    html += `<div class="section-card"><h3>Par compétence</h3><div class="competence-grid">`;
    html += Object.keys(labels).map(k => `<div class="method-item">
      <h4>${labels[k]}</h4>
      ${list(pc[k]) || '<p class="source-note">Non renseigné.</p>'}
    </div>`).join('');
    html += `</div></div>`;
  }

  const pt = m.par_theme || {};
  const themeIds = theme === 'all'
    ? (DATA.programme.thematiques || []).map(t => t.id)
    : [theme];

  themeIds.forEach(id => {
    const rows = Array.isArray(pt[id]) ? pt[id] : [];
    if(!rows.length) return;
    const t = themeById(id);
    html += `<div class="section-card"><h3>${esc((t.icone || '') + ' ' + (t.titre || id))}</h3><div class="method-grid">`;
    html += rows.map(r => `<div class="method-item">
      <div class="method-kicker">${esc(r.situation_typique || 'Situation typique')}</div>
      <p>${esc(r.methode || r.conseil || '')}</p>
      ${list(r.pieges)}
      ${Array.isArray(r.bloc_ids_programme) && r.bloc_ids_programme.length ? `<div class="source-note">Blocs programme : ${r.bloc_ids_programme.map(esc).join(', ')}</div>` : ''}
    </div>`).join('');
    html += `</div></div>`;
  });

  if(Array.isArray(m.checklists) && m.checklists.length){
    html += `<div class="section-card"><h3>Checklists</h3><div class="method-grid">`;
    html += m.checklists.map(c => `<div class="method-item"><h4>${esc(c.titre || 'Checklist')}</h4>${list(c.items)}</div>`).join('');
    html += `</div></div>`;
  }

  const simpleSections = [
    ['redaction_bac','Rédaction au bac'],
    ['usage_des_figures_et_donnees','Figures et données'],
    ['validation_des_resultats','Validation des résultats']
  ];

  simpleSections.forEach(([key,title]) => {
    const rows = Array.isArray(m[key]) ? m[key] : [];
    if(rows.length){
      html += `<div class="section-card"><h3>${title}</h3>${rows.map(x => `<div class="advice">${esc(String(x))}</div>`).join('')}</div>`;
    }
  });

  root.innerHTML = html;
  $('#countStatus').textContent = 'Méthode bac';
  renderMath(root);
}

function renderQuiz(){const ids=theme==='all'?DATA.programme.thematiques.map(t=>t.id):[theme];const qs=ids.flatMap(id=>(DATA.quiz[id]||[]).map(q=>({...q,theme:id})));if(!qs.length){$('#quizRoot').innerHTML='<h3>Quiz local</h3><p>Aucune question disponible pour ce filtre.</p>';return;}let i=0,score=0;function show(){const q=qs[i],t=themeById(q.theme);$('#quizRoot').innerHTML=`<h3>Quiz local — ${t.icone} ${esc(t.titre)}</h3><p>Question ${i+1}/${qs.length} · Score ${score}/${i}</p><h2>${esc(q.question)}</h2>${q.options.map((o,j)=>`<button class="q-option" data-choice="${j}">${esc(o)}</button>`).join('')}<div class="q-expl" id="qExpl"></div>`;$('#quizRoot').querySelectorAll('[data-choice]').forEach(b=>b.onclick=()=>{const choice=Number(b.dataset.choice),ok=choice===q.correct;if(ok)score++;$('#quizRoot').querySelectorAll('[data-choice]').forEach(x=>{x.disabled=true;const c=Number(x.dataset.choice);if(c===q.correct)x.classList.add('good');else if(c===choice)x.classList.add('bad');});$('#qExpl').innerHTML=`${ok?'Correct.':'Erreur.'} ${esc(q.explanation||'')}<br><br><button class="tab active" id="nextQ">${i+1<qs.length?'Question suivante':'Recommencer'}</button>`;$('#qExpl').classList.add('show');$('#nextQ').onclick=()=>{i++;if(i>=qs.length){i=0;score=0;}show();};});renderMath($('#quizRoot'));}show();}


function latexToReadable(s){
  s = String(s ?? '');

  // Supprimer les délimiteurs LaTeX isolés ou mal fermés.
  s = s.replace(/\$\$/g, '');
  s = s.replace(/\$/g, '');

  // Fractions simples : \frac{a}{b} -> (a)/(b)
  s = s.replace(/\\frac\{([^{}]+)\}\{([^{}]+)\}/g, '($1)/($2)');

  // \text{...} -> ...
  s = s.replace(/\\text\{([^{}]*)\}/g, '$1');

  // Commandes fréquentes.
  const repl = [
    [/\\times/g, '×'],
    [/\\cdot/g, '·'],
    [/\\Delta/g, 'Δ'],
    [/\\delta/g, 'δ'],
    [/\\tau/g, 'τ'],
    [/\\lambda/g, 'λ'],
    [/\\theta/g, 'θ'],
    [/\\rho/g, 'ρ'],
    [/\\eta/g, 'η'],
    [/\\varepsilon/g, 'ε'],
    [/\\approx/g, '≈'],
    [/\\leq/g, '≤'],
    [/\\geq/g, '≥'],
    [/\\rightarrow/g, '→'],
    [/\\to/g, '→'],
    [/\\infty/g, '∞'],
  ];
  repl.forEach(([a,b]) => s = s.replace(a,b));

  // Exposants usuels : ^{...} -> ^...
  s = s.replace(/\^\{([^{}]+)\}/g, '^$1');
  s = s.replace(/_\{([^{}]+)\}/g, '_$1');

  // Corriger quelques artefacts fréquents.
  s = s.replace(/\\Deltat/g, 'Δt');
  s = s.replace(/\\DeltaT/g, 'ΔT');
  s = s.replace(/T_air/g, 'T_air');
  s = s.replace(/Tair/g, 'T_air');

  // Retirer les antislashs résiduels devant lettres.
  s = s.replace(/\\([A-Za-z]+)/g, '$1');

  // Espaces typographiques minimaux autour des signes.
  s = s.replace(/\s*=\s*/g, ' = ');
  s = s.replace(/\s*×\s*/g, ' × ');
  s = s.replace(/\s*·\s*/g, ' · ');
  s = s.replace(/\s*≈\s*/g, ' ≈ ');
  s = s.replace(/\s*→\s*/g, ' → ');

  return s;
}

function fmtCorrige(s){
  // Ne jamais convertir le LaTeX ici.
  // fmt() protège les formules déjà délimitées puis KaTeX les rend.
  return fmt(s);
}

function renderCorrige(ex){
  const c = ex.corrige;
  if(!c) return '<p>Corrigé non disponible.</p>';

  if(typeof c === 'string'){
    return fmt(c);
  }

  if(c.questions && Array.isArray(c.questions)){
    return c.questions.map(q => {
      const numero = q.numero || '';
      const reponse = q.reponse || '';
      const attention = q.points_attention || q.vigilance || '';
      return `<div class="corrige-question">
        <h4>Question ${esc(numero)}</h4>
        <div>${fmtCorrige(reponse)}</div>
        ${attention ? `<p class="source-note"><strong>Point d’attention :</strong> ${esc(attention)}</p>` : ''}
      </div>`;
    }).join('');
  }

  return '<p>Corrigé disponible, mais format non reconnu.</p>';
}

function exerciseImages(ex){
  if(ex.page_images && ex.page_images.length) return ex.page_images;
  if(ex.source && ex.source.images && ex.source.images.length) return ex.source.images;
  if(ex.image_page) return [ex.image_page];
  return [];
}

function exercisePages(ex){
  if(ex.pages && ex.pages.length) return ex.pages;
  if(ex.source && ex.source.pages && ex.source.pages.length) return ex.source.pages;
  return [];
}

function exercisePdfUrl(ex){
  if(ex.pdf_embed_url) return ex.pdf_embed_url;
  if(ex.pdf_url && ex.pdf_page) return `${ex.pdf_url}#page=${ex.pdf_page}`;
  if(ex.pdf_path && ex.pdf_page) return `${ex.pdf_path}#page=${ex.pdf_page}`;
  if(ex.source && ex.source.pdf){
    const pages = exercisePages(ex);
    return ex.source.pdf + (pages[0] ? `#page=${pages[0]}` : '');
  }
  return '';
}

function openEx(id,pane='enonce'){
  modalEx = DATA.exercices.find(e => e.id === id);
  if(!modalEx) return;

  pageIndex = 0;
  zoom = 1;
  $('#zoom').value = '1';

  const t = themeById(modalEx.thematique_id);
  $('#modalTitle').textContent = modalEx.titre || 'Exercice';
  $('#modalMeta').textContent =
    `${modalEx.annee || ''} · ${modalEx.session || ''} · ${modalEx.zone || ''} · ${modalEx.points || ''} points · difficulté ${modalEx.difficulte || '?'}/3 · ${t.titre || ''}`;

  $('#modalHelp').innerHTML =
    '<ul>' + ((modalEx.aide || []).map(a => `<li>${fmt(a)}</li>`).join('') || '<li>Aide non disponible.</li>') + '</ul>';

  $('#modalSolution').innerHTML = renderCorrige(modalEx);

  $('#modalNotions').innerHTML =
    (modalEx.notions || []).map(n => `<span class="tag">${esc(n)}</span>`).join('');

  const pages = exercisePages(modalEx);
  const imgs = exerciseImages(modalEx);
  const pdfUrl = exercisePdfUrl(modalEx);

  $('#modalSource').textContent =
    `Source : ${modalEx.pdf_path || modalEx.pdf_url || modalEx.source?.pdf || 'PDF'} · pages ${pages.join(', ') || 'non renseignées'}`;

  $('#openPdf').href = pdfUrl || modalEx.pdf_path || modalEx.pdf_url || '#';
  $('#sourceNote').textContent = pdfUrl
    ? `PDF intégré · ${imgs.length} image(s) disponible(s) en secours`
    : `${imgs.length} page(s) image`;

  $('#masterBtn').textContent = mastered.has(modalEx.id) ? '✅ Maîtrisé' : '○ Marquer comme maîtrisé';

  $('#overlay').classList.add('open');
  showPane(pane);
  renderPage();
  renderMath($('#pane-aide')); renderMath($('#pane-corrige')); renderMath($('#pane-notions'));
}
function showPane(name){
  $$('.modal-tab').forEach(b=>b.classList.toggle('active',b.dataset.pane===name));
  $$('.pane').forEach(p=>p.classList.remove('active'));
  const pane = $('#pane-'+name);
  pane.classList.add('active');
  renderMath(pane);
}
function renderPage(){
  const stage = $('#imageStage');
  const pdfUrl = exercisePdfUrl(modalEx);

  if(pdfUrl){
    const pages = exercisePages(modalEx);
    $('#pageInfo').textContent = pages.length ? `PDF · page ${pages[0]}` : 'PDF';
    $('#prevPage').disabled = true;
    $('#nextPage').disabled = true;
    stage.innerHTML = `<iframe src="${esc(pdfUrl)}" title="Énoncé PDF" style="width:100%;height:76vh;border:0;background:#fff;border-radius:8px"></iframe>`;
    return;
  }

  const imgs = exerciseImages(modalEx);
  const pages = exercisePages(modalEx);

  if(!imgs.length){
    const enonce = modalEx?.enonce || modalEx?.texte_extrait || '';
    stage.innerHTML = enonce
      ? `<div class="page-error"><h3>Énoncé extrait</h3><div class="textblock">${fmt(enonce)}</div></div>`
      : '<div class="page-error">Aucun PDF ni aucune image de page n’est associée à cet exercice.</div>';
    return;
  }

  pageIndex = Math.max(0, Math.min(pageIndex, imgs.length - 1));
  const img = imgs[pageIndex];

  $('#pageInfo').textContent = `${pageIndex + 1}/${imgs.length} · page ${pages[pageIndex] || '?'}`;
  $('#prevPage').disabled = pageIndex === 0;
  $('#nextPage').disabled = pageIndex === imgs.length - 1;

  stage.innerHTML = `<img class="page-img" src="${esc(img)}" alt="Page ${pages[pageIndex] || ''} du sujet" style="width:${Math.round(820 * zoom)}px">`;
}
function navPage(d){
  if(!modalEx) return;
  if(exercisePdfUrl(modalEx)) return;
  const len = exerciseImages(modalEx).length;
  if(!len) return;
  const ni = Math.max(0, Math.min(len - 1, pageIndex + d));
  if(ni !== pageIndex){
    pageIndex = ni;
    renderPage();
  }
}
function closeModal(){$('#overlay').classList.remove('open');modalEx=null;$('#imageStage').innerHTML='';}
function toggleMaster(id,fromModal){if(mastered.has(id))mastered.delete(id);else mastered.add(id);localStorage.setItem('bac_phychi_mastered',JSON.stringify([...mastered]));if(fromModal&&modalEx?.id===id)$('#masterBtn').textContent=mastered.has(id)?'✅ Maîtrisé':'○ Marquer comme maîtrisé';renderAll();}
loadData();
